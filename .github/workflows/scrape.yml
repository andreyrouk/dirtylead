name: Scrape Cleaning Leads

on:
  workflow_dispatch:
    inputs:
      search_query:
        description: 'What to search for'
        required: true
        default: 'residential cleaning service'
      location:
        description: 'City to search in'
        required: true
        default: 'Austin, Texas, USA'
      max_results:
        description: 'Number of results'
        required: true
        default: '100'

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          SEARCH_QUERY: ${{ github.event.inputs.search_query }}
          LOCATION: ${{ github.event.inputs.location }}
          MAX_RESULTS: ${{ github.event.inputs.max_results }}
        run: python scrape_cleaning_leads.py

      - name: Upload CSV as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cleaning-leads
          path: "*.csv"
          retention-days: 7
